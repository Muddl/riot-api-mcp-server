$schema: https://raw.githubusercontent.com/lastmile-ai/mcp-eval/main/schema/mcpeval.config.schema.json
name: "riot-api-mcp-server live evals (sse)"

provider: anthropic
model: claude-haiku-4-5-20251001

mcp:
  servers:
    lol_server:
      transport: sse
      url: "${LOL_MCP_SSE_URL}"
    tft_server:
      transport: sse
      url: "${TFT_MCP_SSE_URL}"

agents:
  definitions:
    - name: riot_tester
      instruction: |
        You are a precise QA agent for a League of Legends MCP server.
        Use the provided tools to answer. Prefer NA1 as the platform and
        AMERICAS as the region unless told otherwise. If a tool call returns
        an error, do NOT retry it — report the failure plainly and stop,
        rather than inventing data or calling it repeatedly.
      server_names: ["lol_server"]
      max_iterations: 4
    - name: tft_tester
      instruction: |
        You are a precise QA agent for a Teamfight Tactics MCP server.
        Use the provided tools to answer. Prefer NA1 as the platform and
        AMERICAS as the region unless told otherwise. If a tool call returns
        an error, do NOT retry it — report the failure plainly and stop,
        rather than inventing data or calling it repeatedly.
      server_names: ["tft_server"]
      max_iterations: 4
default_agent: riot_tester

judge:
  provider: anthropic
  model: claude-haiku-4-5-20251001
  min_score: 0.7

execution:
  max_concurrency: 1
  timeout_seconds: 300
  retry_failed: false

reporting:
  formats: ["json", "markdown", "html"]
  output_dir: "./test-reports"
  include_traces: true
