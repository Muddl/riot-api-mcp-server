name: Release

on: 
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Pushing to GHCR needs write access to GitHub Packages; nothing else is written.
permissions:
  contents: read
  packages: write

jobs:
  publish-image:
    name: Build & publish container image
    runs-on: ubuntu-latest
    strategy:
      matrix:
        server: [lol-mcp-server]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derives image tags/labels from the pushed git tag. metadata-action always
      # lowercases the image name, so the `Muddl` owner resolves to ghcr.io/muddl/...
      # (GHCR rejects uppercase repository paths).
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.server }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            SERVER_MODULE=${{ matrix.server }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
