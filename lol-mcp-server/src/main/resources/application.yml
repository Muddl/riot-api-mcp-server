spring:
  application:
    name: riot-api-mcp-server
  ai:
    mcp:
      server:
        name: riot-api-mcp-server
        version: 1.0.0
        type: SYNC
        sse-message-endpoint: /mcp/messages
        annotation-scanner:
          enabled: true
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      chat:
        enabled: true
        options:
          model: "claude-3-5-sonnet-20241022"
          temperature: 0.7


riot:
  apiKey: ${RIOT_API_KEY} # refreshes every day until you register your product
  region: americas